worker_processes 1;
worker_rlimit_nofile 4096;

events {
    worker_connections 1024;
    use epoll;
}

http {
    access_log off;
    error_log /dev/stderr warn;

    tcp_nodelay on;
    tcp_nopush on;
    sendfile off;
    reset_timedout_connection on;
    lingering_close off;
    keepalive_timeout 30;
    keepalive_requests 2000;

    # Round-robin across 3 API instances (required by challenge).
    upstream api {
        server api-1:8000;
        server api-2:8000;
        server api-3:8000;
        keepalive 32;
    }

    server {
        listen 80;

        # healthz responds locally (no upstream, no X-Instance-Id).
        location /healthz {
            default_type text/plain;
            return 200 "ok";
        }

        # All other requests go to the API via round-robin.
        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_socket_keepalive on;

            # Pass through X-Instance-Id from the API.
            proxy_pass_header X-Instance-Id;
        }
    }
}
