# The 500MB Club — Go submission docker-compose
#
# Stack: 3 × Go API + Redis + Nginx round-robin LB
# Aggregate budget: 2 CPUs / 500 MB

services:
  api-1: &api
    image: ghcr.io/bolacha/the_500mb_club_go:latest
    user: "10001:10001"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    mem_limit: 20m
    cpus: 0.50
    environment:
      - INSTANCE_ID=api-1
      - REDIS_ADDR=storage:6379
      - GOMEMLIMIT=16MiB
      - GOMAXPROCS=1
      - PORT=8000
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks: [backend]
    depends_on:
      storage:
        condition: service_healthy

  api-2:
    <<: *api
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    environment:
      - INSTANCE_ID=api-2
      - REDIS_ADDR=storage:6379
      - GOMEMLIMIT=16MiB
      - GOMAXPROCS=1
      - PORT=8000

  api-3:
    <<: *api
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    environment:
      - INSTANCE_ID=api-3
      - REDIS_ADDR=storage:6379
      - GOMEMLIMIT=16MiB
      - GOMAXPROCS=1
      - PORT=8000

  lb:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    mem_limit: 20m
    cpus: 0.20
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [backend]
    depends_on: [api-1, api-2, api-3]

  storage:
    image: redis:7-alpine
    mem_limit: 200m
    cpus: 0.25
    networks: [backend]
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 250ms
      timeout: 500ms
      retries: 3
    command: redis-server --maxmemory 150mb --maxmemory-policy allkeys-lru --save ""

networks:
  backend:
    driver: bridge
